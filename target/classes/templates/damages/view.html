<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали повреждения - CarSh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 2rem; color: #2c3e50; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .info-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: bold; color: #666; }
        .info-value { color: #2c3e50; }
        .status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-PENDING { background: #fff3cd; color: #856404; }
        .status-PAID { background: #d4edda; color: #155724; }
        .status-CANCELLED { background: #f8d7da; color: #721c24; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 5px; text-decoration: none; font-weight: bold; margin-right: 0.5rem; cursor: pointer; border: none; }
        .btn-success { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .back-link { text-align: center; margin-top: 2rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>Повреждение №<span th:text="${damage.id}">1</span></h1>
    
    <div class="card">
        <h2 style="margin-bottom: 1.5rem;">Информация о повреждении</h2>
        
        <div class="info-row">
            <span class="info-label">Автомобиль:</span>
            <span class="info-value" th:text="${damage.car.brand + ' ' + damage.car.model}">Auto</span>
        </div>
        <div class="info-row">
            <span class="info-label">Заказ:</span>
            <span class="info-value">
                <a th:href="@{/orders/{id}(id=${damage.order.id})}" th:text="'#' + ${damage.order.id}">#1</a>
            </span>
        </div>
        <div class="info-row">
            <span class="info-label">Описание:</span>
            <span class="info-value" th:text="${damage.description}">Описание</span>
        </div>
        <div class="info-row">
            <span class="info-label">Стоимость ремонта:</span>
            <span class="info-value" th:text="${damage.repairCost} + ' ₽'">1000 ₽</span>
        </div>
        <div class="info-row">
            <span class="info-label">Дата повреждения:</span>
            <span class="info-value" th:text="${damage.damageDate}">2024-01-01</span>
        </div>
        <div class="info-row">
            <span class="info-label">Статус:</span>
            <span class="status" th:classappend="'status-' + ${damage.status.name()}" 
                  th:text="${damage.status.name()}">PENDING</span>
        </div>
    </div>
    
    <div th:if="${damage.status.name() == 'PENDING'}" style="text-align: center; margin-top: 1.5rem;">
        <form th:action="@{/damages/pay/{id}(id=${damage.id})}" method="post" style="display: inline;">
            <button type="submit" class="btn btn-success">Отметить как оплаченное</button>
        </form>
    </div>
    
    <div class="back-link">
        <a href="/damages/admin" class="btn btn-secondary">← К списку повреждений</a>
        <a href="/orders/admin" class="btn btn-secondary">← К заказам</a>
    </div>
</div>
</body>
</html>
