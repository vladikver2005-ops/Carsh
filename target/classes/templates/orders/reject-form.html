<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отклонение заказа - CarSh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 2rem; color: #2c3e50; }
        .form-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #2c3e50; }
        .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; min-height: 150px; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 5px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; margin-right: 0.5rem; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1>Отклонение заказа</h1>
    
    <form th:action="@{/orders/admin/reject/{id}(id=${orderId})}" method="post" class="form-card">
        <div class="form-group">
            <label for="reason">Причина отказа:</label>
            <textarea id="reason" name="reason" placeholder="Укажите причину отклонения заказа..." required></textarea>
        </div>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-danger">Отклонить заказ</button>
            <a th:href="@{/orders/admin}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
