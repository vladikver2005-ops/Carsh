<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление заказами - CarSh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; color: #333; line-height: 1.6; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 2rem; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #2c3e50; color: white; }
        tr:hover { background: #f9f9f9; }
        .status { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-PENDING { background: #fff3cd; color: #856404; }
        .status-APPROVED { background: #d4edda; color: #155724; }
        .status-ACTIVE { background: #cce5ff; color: #004085; }
        .status-COMPLETED { background: #d4edda; color: #155724; }
        .status-REJECTED { background: #f8d7da; color: #721c24; }
        .status-DAMAGED { background: #f8d7da; color: #721c24; }
        .btn { display: inline-block; padding: 0.5rem 1rem; border-radius: 5px; text-decoration: none; font-weight: bold; margin-right: 0.25rem; font-size: 0.85rem; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-warning { background: #ffc107; color: #212529; }
        .back-link { text-align: center; margin-top: 2rem; }
        .alert { padding: 1rem; border-radius: 5px; margin-bottom: 1rem; text-align: center; }
        .alert-info { background: #e7f3ff; color: #0066cc; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h1>Управление заказами (Администратор)</h1>
    
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        Заказов пока нет.
    </div>
    
    <table th:unless="${#lists.isEmpty(orders)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Клиент</th>
                <th>Автомобиль</th>
                <th>Даты аренды</th>
                <th>Стоимость</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.client.firstName + ' ' + order.client.lastName}">Иван Клиентов</td>
                <td th:text="${order.car.brand + ' ' + order.car.model}">Auto</td>
                <td>
                    <span th:text="${order.startDate}"></span> - 
                    <span th:text="${order.endDate}"></span>
                </td>
                <td th:text="${order.totalPrice} + ' ₽'">5000 ₽</td>
                <td>
                    <span class="status" th:classappend="'status-' + ${order.status.name()}" 
                          th:text="${order.status.name()}">PENDING</span>
                </td>
                <td>
                    <form th:if="${order.status.name() == 'PENDING'}" th:action="@{/orders/admin/approve/{id}(id=${order.id})}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-success">✓</button>
                    </form>
                    <a th:if="${order.status.name() == 'PENDING'}" th:href="@{/orders/admin/reject/{id}(id=${order.id})}" class="btn btn-danger">✗</a>
                    <form th:if="${order.status.name() == 'ACTIVE'}" th:action="@{/orders/admin/return/{id}(id=${order.id})}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-warning">Возврат</button>
                    </form>
                    <a th:if="${order.status.name() == 'COMPLETED' || order.status.name() == 'DAMAGED'}" th:href="@{/damages/new/{orderId}(orderId=${order.id})}" class="btn btn-info">Повреждение</a>
                    <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-info">👁</a>
                </td>
            </tr>
        </tbody>
    </table>
    
    <div class="back-link">
        <a href="/" class="btn btn-info">← На главную</a>
    </div>
</div>
</body>
</html>
