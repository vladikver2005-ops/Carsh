<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${car.brand + ' ' + car.model}">Автомобиль</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; margin-bottom: 2rem; color: #2c3e50; }
        .car-detail { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .car-image-large { width: 100%; height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 1.5rem; background: #f5f5f5; }
        .car-info h2 { color: #2c3e50; margin-bottom: 1rem; }
        .car-info p { margin-bottom: 0.75rem; color: #555; }
        .car-price-large { font-size: 1.5rem; font-weight: bold; color: #667eea; margin: 1rem 0; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 5px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; margin-right: 0.5rem; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: #6c757d; color: white; }
        .back-link { text-align: center; margin-top: 2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="car-detail">
        <img th:src="${car.imageUrl != null ? car.imageUrl : '/images/default-car.png'}"
             alt="Автомобиль" class="car-image-large"
             onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iOTAwIiBoZWlnaHQ9IjQwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iOTAwIiBoZWlnaHQ9IjQwMCIgZmlsbD0iI2RkZCIvPjx0ZXh0IHg9IjQ1MCIgeT0iMjAwIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMjQiIGZpbGw9IiM2NjYiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkF2dG88L3RleHQ+PC9zdmc+'">
        
        <div class="car-info">
            <h2 th:text="${car.brand + ' ' + car.model}">Марка Модель</h2>
            <p><strong>Год выпуска:</strong> <span th:text="${car.carYear}">2023</span></p>
            <p><strong>Цвет:</strong> <span th:text="${car.color}">Красный</span></p>
            <p><strong>Номер:</strong> <span th:text="${car.licensePlate}">А001АА77</span></p>
            <p class="car-price-large"><span th:text="${car.rentalPricePerDay}">5000</span> ₽/день</p>
            <p><strong>Описание:</strong></p>
            <p th:text="${car.description}">Описание автомобиля</p>
            
            <div style="margin-top: 1.5rem;">
                <a th:href="@{/orders/new/{carId}(carId=${car.id})}" class="btn btn-primary">Заказать</a>
                <a href="/cars" class="btn btn-secondary">Назад к списку</a>
            </div>
        </div>
    </div>
    
    <div class="back-link">
        <a href="/" class="btn btn-secondary">← На главную</a>
    </div>
</div>
</body>
</html>
